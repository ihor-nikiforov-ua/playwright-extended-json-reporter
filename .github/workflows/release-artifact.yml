name: Pre-NPM Release Artifact

# Issue #70 implements the Pre-NPM Release slice of the Public Package Surface
# PRD. Every release ships as a versioned GitHub Release with the `npm pack`
# tarball attached as the Release Artifact, so maintainers can inspect the
# package that would later be published to npm without uploading anything to
# the npm registry.
#
# Triggers:
#
# - `push` of a `v*.*.*` Release Tag drives the authoritative artifact build.
# - `workflow_dispatch` lets maintainers re-run the artifact build on demand,
#   for example after fixing a release workflow regression.
#
# This workflow intentionally never invokes `npm publish`; the `package.json`
# `prepublishOnly` guard provides a second layer of defence. See
# `docs/public/release-process.md` for the full Pre-NPM Release flow.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-artifact:
    name: Build and attach Pre-NPM Release Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run release-gate

      - name: Build Pre-NPM Release Artifact
        run: npm run release:artifact

      - name: Create or update GitHub Release with attached tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" *.tgz \
            --title "$RELEASE_TAG" \
            --notes "Pre-NPM Release Artifact for $RELEASE_TAG. See CHANGELOG.md for release notes." \
            --verify-tag \
            || gh release upload "$RELEASE_TAG" *.tgz --clobber
